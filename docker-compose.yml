services:
  postgres:
    image: postgres:16
    container_name: ticketflow_postgres
    environment:
      POSTGRES_USER: ticketflow
      POSTGRES_PASSWORD: ticketflow123
      POSTGRES_DB: ticketflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: ticketflow_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"   # porta da fila (usada pelo app)
      - "15672:15672" # painel web de gerenciamento

volumes:
  postgres_data:
